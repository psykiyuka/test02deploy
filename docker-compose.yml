services:
  nginx:
    image: nginx:alpine
    ports:
      - "83:83"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shop-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  shop-service:
    build: ./shop-service
    ports:
      - "8004:8001"
    volumes:
      - ./shop-service:/app
    env_file:
      - ./shop-service/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://user:1234@postgres:5432/agent}
      - REDIS_URL=${REDIS_URL:-redis://:redis123@redis:6379/0}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - QWEN_API_KEY=${QWEN_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
